<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#0A0A0A"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1A1A1A" stroke-width="0.5"/>
  </pattern>
  <rect width="600" height="400" fill="url(#grid)"/>

  <!-- Title -->
  <text x="300" y="45" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="14" font-weight="bold">PLAYWRIGHT ARCHAEOLOGIST</text>
  <text x="300" y="65" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Automated Test Archaeology &amp; E2E Intelligence</text>

  <!-- Browser frame -->
  <rect x="60" y="85" width="480" height="35" rx="8" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="1"/>
  <rect x="60" y="100" width="480" height="210" fill="#111111" stroke="#2A2A2A" stroke-width="1"/>
  <circle cx="82" cy="103" r="5" fill="#FF5F56"/>
  <circle cx="98" cy="103" r="5" fill="#FFBD2E"/>
  <circle cx="114" cy="103" r="5" fill="#27C93F"/>
  <rect x="180" y="95" width="240" height="16" rx="4" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="0.5"/>
  <text x="300" y="106" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">https://target-app.dev</text>

  <!-- Test flow visualization -->
  <!-- Step 1 -->
  <rect x="80" y="130" width="120" height="50" rx="6" fill="#1A1A1A" stroke="#C9A84C" stroke-width="1"/>
  <text x="140" y="150" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="9">CRAWL</text>
  <text x="140" y="165" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">Discover Routes</text>

  <!-- Arrow -->
  <line x1="200" y1="155" x2="230" y2="155" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
  <polygon points="228,152 228,158 234,155" fill="#C9A84C" opacity="0.6"/>

  <!-- Step 2 -->
  <rect x="235" y="130" width="120" height="50" rx="6" fill="#1A1A1A" stroke="#C9A84C" stroke-width="1"/>
  <text x="295" y="150" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="9">ANALYZE</text>
  <text x="295" y="165" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">Map Selectors</text>

  <!-- Arrow -->
  <line x1="355" y1="155" x2="385" y2="155" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
  <polygon points="383,152 383,158 389,155" fill="#C9A84C" opacity="0.6"/>

  <!-- Step 3 -->
  <rect x="390" y="130" width="130" height="50" rx="6" fill="#1A1A1A" stroke="#C9A84C" stroke-width="1"/>
  <text x="455" y="150" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="9">GENERATE</text>
  <text x="455" y="165" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">E2E Test Specs</text>

  <!-- Output panel -->
  <rect x="80" y="200" width="440" height="95" rx="6" fill="#0D0D0D" stroke="#2A2A2A" stroke-width="0.5"/>
  <text x="95" y="220" fill="#27C93F" font-family="monospace" font-size="8">✓ test('login flow works', async ({ page }) =&gt; {</text>
  <text x="110" y="235" fill="#888" font-family="monospace" font-size="8">await page.goto('/login');</text>
  <text x="110" y="250" fill="#888" font-family="monospace" font-size="8">await page.fill('[data-testid="email"]', ...);</text>
  <text x="110" y="265" fill="#888" font-family="monospace" font-size="8">await expect(page).toHaveURL('/dashboard');</text>
  <text x="95" y="280" fill="#27C93F" font-family="monospace" font-size="8">});</text>

  <!-- Bottom bar -->
  <rect x="60" y="335" width="480" height="35" rx="6" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="0.5"/>
  <text x="150" y="357" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="10">Route Discovery</text>
  <text x="300" y="357" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="10">Selector Mapping</text>
  <text x="450" y="357" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="10">Spec Generation</text>
</svg>
